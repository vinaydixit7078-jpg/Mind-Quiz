
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white text-center p-4">
        <h1 class="text-3xl font-bold">Quiz Application</h1>
    </header>

    <main class="flex-grow flex items-center justify-center">

        <section class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">

            <h2 class="text-2xl font-bold text-center mb-6">
                Start Your Quiz
            </h2>

            <form id="loginForm" class="space-y-4">

                <div>
                    <label class="block mb-1 font-medium">Name</label>
                    <input type="text" id="username" required placeholder="Enter your name"
                        class="w-full border p-3 rounded focus:outline-blue-500">
                </div>

                <div>
                    <label class="block mb-1 font-medium">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email"
                        class="w-full border p-3 rounded focus:outline-blue-500">
                </div>

                <div>
                    <label class="block mb-1 font-medium">Select Category</label>
                    <select id="category" class="w-full border p-3 rounded">

                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="javascript">JavaScript</option>
                        <option value="general">General Knowledge</option>

                    </select>
                </div>

                <div>
                    <label class="block mb-1 font-medium">Difficulty</label>
                    <select id="difficulty" class="w-full border p-3 rounded">

                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>

                    </select>
                </div>

                <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded hover:bg-blue-600 transition">
                    Start Quiz
                </button>

            </form>

        </section>

    </main>

    <footer class="text-center p-3 text-gray-500">
        <p>© 2026 Quiz App</p>
    </footer>

    <script>

        document.getElementById("loginForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                const name = document.getElementById("username").value;
                const email = document.getElementById("email").value;
                const category = document.getElementById("category").value;
                const difficulty = document.getElementById("difficulty").value;

                localStorage.setItem("username", name);
                localStorage.setItem("email", email);
                localStorage.setItem("category", category);
                localStorage.setItem("difficulty", difficulty);

                window.location.href = "quiz.html";

            });

        document.addEventListener("keydown", function (e) {

            if (e.key === "Enter") {
                document.getElementById("loginForm").requestSubmit();
            }

        });

    </script>

</body>

</html>
