<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 min-h-screen flex flex-col">

    <header class="bg-green-600 text-white p-4 text-center shadow">
        <h1 class="text-3xl font-bold">Quiz Result</h1>
    </header>

    <main class="flex-grow flex items-center justify-center px-4">

        <section class="bg-white p-10 rounded-xl shadow-lg text-center max-w-md w-full">

            <h2 class="text-2xl font-bold mb-2">Congratulations 🎉</h2>

            <p class="text-gray-600 mb-4">
                Here is your quiz performance
            </p>

            <p id="resultText" class="text-xl font-semibold mb-4"></p>

            <p id="performance" class="mb-6 text-lg"></p>

            <!-- Score Progress Bar -->
            <div class="w-full bg-gray-200 rounded-full h-3 mb-6">
                <div id="scoreBar" class="bg-green-500 h-3 rounded-full" style="width:0%">
                </div>
            </div>

            <div class="flex justify-center gap-4">

                <a href="quiz.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Retry Quiz
                </a>

                <a href="index.html" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                    Home
                </a>

            </div>

        </section>

    </main>

    <footer class="text-center p-3 text-gray-600">
        <p>© 2026 Quiz App</p>
    </footer>

    <script>

        const name = localStorage.getItem("username") || "User";
        const score = parseInt(localStorage.getItem("score")) || 0;

        const totalQuestions = 10;

        document.getElementById("resultText").innerText =
            name + ", your score is " + score + " / " + totalQuestions;

        /* Performance Message */

        let message = "";

        if (score === totalQuestions) {
            message = "Excellent! Perfect Score 🏆";
        }
        else if (score >= totalQuestions / 2) {
            message = "Good Job 👍";
        }
        else {
            message = "Keep Practicing 💡";
        }

        document.getElementById("performance").innerText = message;

        /* Score Progress Bar */

        let percent = (score / totalQuestions) * 100;

        document.getElementById("scoreBar").style.width =
            percent + "%";

    </script>

</body>

</html>
